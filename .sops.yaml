      - age: [*squid]
        pgp: [*yubikey_01, *yubikey_02]
  - path_regex: modules/secrets/coral.ya?ml$
    key_groups:
      - age: [*coral]
        pgp: [*yubikey_01, *yubikey_02]
  - path_regex: modules/secrets/netrc.ya?ml$
    key_groups:
      - age: [*sponge, *squid, *coral]
        pgp: [*yubikey_01, *yubikey_02]

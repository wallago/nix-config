name: CD
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-and-cache:
    name: Build & push to Attic
    runs-on: ubuntu-latest
    environment: "ATTIC Cache"
    strategy:
      fail-fast: false
      matrix:
        host: [coral, sponge, squid]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Install Attic client
        run: nix profile add nixpkgs#attic-client
      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          CACHE_ORIGIN_IP: ${{ secrets.CACHE_ORIGIN_IP }}
        run: |
          attic login wallago https://cache.wallago.xyz "$ATTIC_TOKEN"
          attic use wallago:mycache
      - name: Build host closure
        id: build
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --no-link --print-out-paths > out-paths.txt
          echo "Built: $(cat out-paths.txt)"
      - name: Push to Attic
        run: attic push wallago:mycache $(cat out-paths.txt)

# configuration for https://github.com/crate-ci/typos

[default.extend-words]
# Whitelist false positives: format is word = "word"
# Example:
# ratatui = "ratatui"
# kubernetes = "kubernetes"

[default.extend-identifiers]
# Hex colors and other opaque identifiers typos shouldn't split
C0CAF5 = "C0CAF5"


[files]
# Exclude files or directories from checking
extend-exclude = ["*.lock", "modules/secrets/"]
